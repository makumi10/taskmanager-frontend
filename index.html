<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!--------------- Header ------------------>
<header>
  <h1>Task Manager App</h1>
  <div class="header-stats">
    <div class="stat">
      <span class="dot" style="background:#f59e0b"></span>
      <span id="stat-pending">0 Pending</span>
    </div>
    <div class="stat">
      <span class="dot" style="background:#3b82f6"></span>
      <span id="stat-progress">0 In Progress</span>
    </div>
    <div class="stat">
      <span class="dot" style="background:#22c55e"></span>
      <span id="stat-completed">0 Completed</span>
    </div>
  </div>
</header>

<!---------------- Main Content ----------------->
<main>
  <div class="top-bar">
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="pending">Pending</button>
      <button class="filter-tab" data-filter="in_progress">In Progress</button>
      <button class="filter-tab" data-filter="completed">Completed</button>
    </div>
    <button class="btn-primary" onclick="openModal()">+ New Task</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Due Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="task-tbody">
        <tr class="state-row">
          <td colspan="4">Loading tasks...</td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<!------------------ Modal ------------------->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">New Task</h2>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <form id="task-form" onsubmit="handleSubmit(event)">
      <input type="hidden" id="task-id"/>
      <div class="form-group">
        <label for="title">Title *</label>
        <input type="text" id="title" placeholder="Task title" maxlength="255"/>
        <div class="form-error" id="title-error">Title is required.</div>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Optional description..."></textarea>
      </div>
      <div class="form-group">
        <label for="status">Status</label>
        <select id="status">
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>
      </div>
      <div class="form-group">
        <label for="due-date">Due Date</label>
        <input type="date" id="due-date"/>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-submit" id="submit-btn">
          <span id="submit-text">Create Task</span>
        </button>
      </div>
    </form>
  </div>
</div>

<!---------------- Confirm Delete Overlay ------------------>
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>Delete Task?</h3>
    <p>This cannot be undone. The task will be permanently removed.</p>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-danger" id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script src="js/app.js"></script>
</body>
</html>
